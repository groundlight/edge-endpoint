events {
    worker_connections 16;
}

http {
    server {
        listen 6717;

        location / {
            proxy_pass http://localhost:6718;

            # Intercept specific errors from the local app and attempt to use the cloud API server
            error_page 404 422 405 = @fallback;
        }

        location @fallback {
            # use auth_request to attempt the cloud API, but also retain the ability to return control. 
            auth_request /cloud-subrequest;
            auth_request_set $auth_response $upstream_status;

            # If cloud API is successful (i.e., 2xx), return control the local FastAPI 
            if ($auth_response ~ ^2) {
                rewrite ^/.* /post_process break;
                proxy_pass http://localhost:6718;
            }
            # If the cloud API fails, just use its response as the response to the client
            proxy_pass https://api.groundlight.ai;
        }

        location = /cloud-subrequest {
            internal;
            proxy_pass https://api.groundlight.ai$request_uri;

            # proxy_set_header Host $host;
            # proxy_set_header X-Real-IP $remote_addr;
            # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

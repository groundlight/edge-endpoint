schema_version: 1

run:
  name: "fire-fall-fence-3lens"
  duration_seconds: 600
  warmup_seconds: 30
  output_dir: "./benchmark-results/{name}-{ts}/"
  edge_endpoint_url: "http://localhost:30101"
  api_token_env: "GROUNDLIGHT_API_TOKEN"
  set_config_timeout_seconds: 900
  cloud_endpoint: "https://api.groundlight.ai/"
  detector_name_prefix: "bench"
  refuse_if_host_not_clean: true

detectors:
  - name: "person_bbox_v1"
    type: "bounding_box"
    mlpipe: null
    n: 10

  - name: "fire_bbox_v1"
    type: "bounding_box"
    mlpipe: null
    n: 10

  - name: "fall_binary_v1"
    type: "binary"
    mlpipe: null

  - name: "climb_binary_v1"
    type: "binary"
    mlpipe: null

lenses:
  - name: "fire_lens"
    chain:
      - detector: "fire_bbox_v1"
    target_fps: 5
    cameras: 1
    image:
      base: "images/dog.jpeg"
      resolution: [1920, 1080]
      composite_objects: 3
      seed: 42
    error_budget_pct: 1

  - name: "person_down_lens"
    chain:
      - detector: "person_bbox_v1"
        num_crops_into_next: 3
      - detector: "fall_binary_v1"
    target_fps: 5
    cameras: 4
    image:
      base: "images/dog.jpeg"
      resolution: [1920, 1080]
      composite_objects: null
      seed: 42
    downstream_crop:
      resize_to: [224, 224]
      padding_image: "images/cat.jpeg"
    error_budget_pct: 1

  - name: "person_climb_lens"
    chain:
      - detector: "person_bbox_v1"
        num_crops_into_next: 5
      - detector: "climb_binary_v1"
    target_fps: 5
    cameras: 4
    image:
      base: "images/dog.jpeg"
      resolution: [1920, 1080]
      composite_objects: null
      seed: 43
    downstream_crop:
      resize_to: [224, 224]
      padding_image: "images/cat.jpeg"
    error_budget_pct: 1

monitoring:
  sample_hz: 2
  steady_state_window_seconds: 10

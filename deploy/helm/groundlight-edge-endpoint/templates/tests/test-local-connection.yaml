# A simple test to see if the edge-endpoint service is responding to readiness probes
apiVersion: v1
kind: Pod
metadata:
  name: "test-ee-local-connection"
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "groundlight-edge-endpoint.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      # Note that we use the constant port here because we're connecting to the service
      # inside the k3s cluster with the k3s service name. When httpEnabled is true we use
      # port 30101 (HTTP); when false we use port 443 (HTTPS) with --no-check-certificate
      # since the edge endpoint uses a self-signed certificate.
      args:
      {{- if .Values.httpEnabled }}
        - '-O'
        - '-'
        - '{{ include "groundlight-edge-endpoint.fullname" . }}-service:30101/health/ready'
      {{- else }}
        - '--no-check-certificate'
        - '-O'
        - '-'
        - 'https://{{ include "groundlight-edge-endpoint.fullname" . }}-service:443/health/ready'
      {{- end }}
  restartPolicy: Never

# Test to see if edge-endpoint can proxy to the cloud
apiVersion: v1
kind: Pod
metadata:
  name: "test-ee-cloud-connection"
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "groundlight-edge-endpoint.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['sh']
      # We use the internal service port here (30101 for HTTP, 443 for HTTPS), not the
      # NodePort exposed to the host. When httpEnabled is false, we use --no-check-certificate
      # since the edge endpoint uses a self-signed certificate.
      args:
      - '-c'
      {{- if .Values.httpEnabled }}
      - 'wget -O - --header "x-api-token: ${GROUNDLIGHT_API_TOKEN}" {{ include "groundlight-edge-endpoint.fullname" . }}-service:30101/device-api/v1/me'
      {{- else }}
      - 'wget --no-check-certificate -O - --header "x-api-token: ${GROUNDLIGHT_API_TOKEN}" https://{{ include "groundlight-edge-endpoint.fullname" . }}-service:443/device-api/v1/me'
      {{- end }}
      env:
      - name: GROUNDLIGHT_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: groundlight-api-token
            key: GROUNDLIGHT_API_TOKEN
            optional: true
  restartPolicy: Never

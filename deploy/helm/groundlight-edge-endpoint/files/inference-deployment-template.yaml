apiVersion: v1
kind: Service
metadata:
  name: placeholder-inference-service-name
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: inference-server
    instance: placeholder-inference-instance-name
  ports:
    - protocol: TCP
      port: 8000
      name: http
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: placeholder-inference-deployment-name
  namespace: {{ .Values.namespace }}
  labels:
    name: placeholder-inference-deployment-name
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: inference-server
      instance: placeholder-inference-instance-name
  template:
    metadata:
      labels:
        app: inference-server
        instance: placeholder-inference-instance-name
    spec:
      hostPID: true  # Allows pynvml to match this process's PID against nvidia-smi PIDs for accurate per-pod VRAM reporting
{{ if eq .Values.inferenceFlavor "gpu" }}
      runtimeClassName: nvidia  # Required for GPU use in k3s
{{- end }}
      serviceAccountName: edge-endpoint-service-account
      imagePullSecrets:
      - name: registry-credentials

      containers:
      - name: inference-server
        image: 767397850842.dkr.ecr.us-west-2.amazonaws.com/gl-edge-inference{{ if .Values.useMinimalImage }}-minimal{{ end }}:{{ include "groundlight-edge-endpoint.inferenceTag" . }}
        imagePullPolicy: "{{ include "groundlight-edge-endpoint.inferencePullPolicy" . }}"
        env:
        - name: MODEL_REPOSITORY
          value: &modelRepository /opt/groundlight/edge/serving/model-repo
        - name: MODEL_NAME
          value: placeholder-model-name
        - name: PINAMOD_DIR
          value: /opt/models/pinamod
        - name: HF_HUB_CACHE
          value: /opt/models/pretrained-weights/hf-hub
        - name: TORCH_HOME
          value: /opt/models/pretrained-weights/torch-home
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: TRANSFORMERS_OFFLINE
          value: "1"
        - name: LOG_LEVEL
          value: {{ .Values.logLevel | quote }}
        - name: LOAD_ALL_PIPELINES  # Load only the pipelines that are needed for edge inference.
          value: "false"
        - name: INFERENCE_FLAVOR
          value: "{{ .Values.inferenceFlavor }}"
        - name: WORKERS  # Number of uvicorn workers for the inference server
          value: "1"
        - name: EDGE_COMPILE_ENABLED
          value: "{{ .Values.edgeCompileEnabled }}"
        volumeMounts:
        - name: edge-endpoint-persistent-volume
          mountPath: *modelRepository
        - name: pinamod-mount
          mountPath: /opt/models
          readOnly: true
        # Shared volume for profiling traces.
        - name: device-info-volume
          mountPath: /opt/groundlight/device
        ports:
        - containerPort: 8000
          name: http-fastapi
        startupProbe:
          httpGet:
            path: /health/live  # Checks if the server is up
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 270  # Wait for up to 45 min
        readinessProbe:
          httpGet:
            path: /health/ready  # Checks if the server is ready to serve requests
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3  # after 30 seconds of failure, stop sending traffic to the pod
        livenessProbe:
          httpGet:
            # We use "ready" here because the current liveness probe is too simple and
            # doesn't check if the model is loaded.  If the models fail because of GPU memory
            # issues, we need this to fail and restart the pod.
            path: /health/ready
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 6  # after 60 seconds of failure, restart the pod
        lifecycle:
          preStop:
            exec:
              # Delay SIGTERM so kube-proxy can remove this pod from iptables
              # before uvicorn stops accepting connections.
              command: ["sh", "-c", "sleep 10"]

      volumes:
      - name: edge-endpoint-persistent-volume
        persistentVolumeClaim:
          claimName: edge-endpoint-pvc
      - name: pinamod-mount
        hostPath:
          path: {{ .Values.s3Mount.mountPath }}
          type: Directory
      - name: device-info-volume
        hostPath:
          path: /opt/groundlight/device
          type: DirectoryOrCreate

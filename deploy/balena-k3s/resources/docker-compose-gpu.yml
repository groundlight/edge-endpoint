version: "2.4"

# Balena docker-compose.yml for standing up a k3s server (with NVIDIA GPU support) and bastion.
# GPU kernel modules are built as a multi-stage Docker build inside the server image,
# then loaded at runtime via load_gpu.sh before k3s starts.
#
# IMPORTANT: BALENA_OS_VERSION must match the balenaOS version running on the device.
# Use deploy_balena.sh to set this automatically, or override the default below.
#
# Limitations: Currently only works on `generic-amd64` devices.

services:
  server:
    # https://docs.k3s.io/advanced#running-k3s-in-docker
    build:
      context: deploy/balena-k3s/server
      dockerfile: Dockerfile.gpu
      args:
        NVIDIA_DRIVER_VERSION: "570.133.07"
        BALENA_OS_VERSION: "6.0.24%2Brev1"
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    privileged: true
    network_mode: host
    environment:
      # https://docs.k3s.io/cli/server#cluster-options
      K3S_KUBECONFIG_OUTPUT: "/shared/kubeconfig.yaml"
      K3S_KUBECONFIG_MODE: "644"
      EXTRA_K3S_SERVER_ARGS: "--disable traefik"
    tmpfs:
      - /run:rshared,exec
      - /var/run:rshared,exec
    volumes:
      - k3s-server:/var/lib/rancher/k3s
      - shared:/shared
      - pinamod:/opt/groundlight/edge/pinamod-public

  bastion:
    build:
      context: deploy/balena-k3s/bastion
    network_mode: host
    environment:
      KUBECONFIG: "/shared/kubeconfig.yaml"
    volumes:
      - shared:/shared:ro
    depends_on:
      - server

volumes:
  k3s-server: {}
  shared: {}
  pinamod: {}
